<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formularz Poszukiwania Nieruchomości</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="wizard-shell">
        <section id="welcome-screen" class="form-card">
          <h1>Znajdźmy nieruchomość dopasowaną do Twoich potrzeb</h1>
          <p>
            Odpowiedz na kilka krótkich pytań, a łatwiej określimy, jakie oferty
            naprawdę warto brać pod uwagę.
          </p>
          <p>
            Formularz jest podzielony na etapy i zajmuje tylko kilka minut.
            Możesz przejść go spokojnie krok po kroku.
          </p>
          <button id="start-form" class="primary-button" type="button">
            Zaczynam
          </button>
        </section>

        <header class="wizard-header">
          <div><h2 id="section-title">Cel i tryb poszukiwania</h2></div>
          <div class="progress-meta">
            <span id="step-counter">Etap 1 / 9</span>
          </div>
        </header>

        <nav id="step-tabs" class="step-tabs" aria-label="Etapy formularza"></nav>

        <form id="property-form" class="form-card">
          <div id="form-fields" class="form-fields"></div>

          <footer id="form-footer" class="form-footer">
            <div class="footer-actions">
              <button id="prev-step" class="secondary-button" type="button">
                Wstecz
              </button>
              <button id="next-step" class="primary-button" type="button">
                Dalej
              </button>
            </div>
          </footer>
        </form>
      </main>
    </div>

    <template id="matrix-template">
      <div class="matrix-table"></div>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
